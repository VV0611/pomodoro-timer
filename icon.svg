<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon for the Pomodoro Timer PWA -->

  <!-- Background: dark navy square with rounded corners (matches the app theme) -->
  <rect width="512" height="512" rx="90" fill="#1a1a2e"/>

  <!-- Tomato body: red-pink circle (the main shape) -->
  <circle cx="256" cy="295" r="175" fill="#e94560"/>

  <!-- Inner darker ring for depth -->
  <circle cx="256" cy="295" r="175" fill="none" stroke="#c73652" stroke-width="8"/>

  <!-- Highlight: white ellipse in the top-left = makes it look 3D and shiny -->
  <ellipse cx="208" cy="240" rx="58" ry="40"
    fill="rgba(255,255,255,0.22)"
    transform="rotate(-20 208 240)"/>

  <!-- Stem: thin green rectangle above the tomato -->
  <rect x="247" y="85" width="18" height="88" rx="9" fill="#4ecca3"/>

  <!-- Left leaf -->
  <path d="M256 128 C228 88 178 96 182 130 C210 114 238 126 256 128Z" fill="#4ecca3"/>

  <!-- Right leaf -->
  <path d="M256 128 C284 88 334 96 330 130 C302 114 274 126 256 128Z" fill="#4ecca3"/>
</svg>
